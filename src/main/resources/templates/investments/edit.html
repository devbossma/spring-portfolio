<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Investment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">My Portfolio</span>
        <div class="ms-auto">
            <a href="/portfolio" class="btn btn-outline-light me-2">Portfolio</a>
            <a href="/investments" class="btn btn-outline-light me-2">Investments</a>
            <a href="/auth/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Edit Investment</h1>
        <a th:href="@{/investments/{id}(id=${investment.id})}" class="btn btn-secondary">Back to Investment</a>
    </div>

    <div class="row">
        <div class="col-md-8">
            <form th:action="@{/investments/{id}/edit(id=${investment.id})}" method="post">
                <input type="hidden" name="id" th:value="${investment.id}">

                <div class="card">
                    <div class="card-header">
                        <h5>Basic Information</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Investment Name</label>
                                    <input type="text" class="form-control" id="name" name="name" th:value="${investment.name}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="sector" class="form-label">Sector</label>
                                    <select class="form-control" id="sector" name="sector" required>
                                        <option th:value="'TECHNOLOGY'" th:selected="${investment.sector.name() == 'TECHNOLOGY'}">Technology</option>
                                        <option th:value="'HEALTHCARE'" th:selected="${investment.sector.name() == 'HEALTHCARE'}">Healthcare</option>
                                        <option th:value="'FINANCE'" th:selected="${investment.sector.name() == 'FINANCE'}">Finance</option>
                                        <option th:value="'ENERGY'" th:selected="${investment.sector.name() == 'ENERGY'}">Energy</option>
                                        <option th:value="'CONSUMER_DISCRETIONARY'" th:selected="${investment.sector.name() == 'CONSUMER_DISCRETIONARY'}">Consumer Discretionary</option>
                                        <option th:value="'CONSUMER_STAPLES'" th:selected="${investment.sector.name() == 'CONSUMER_STAPLES'}">Consumer Staples</option>
                                        <option th:value="'INDUSTRIALS'" th:selected="${investment.sector.name() == 'INDUSTRIALS'}">Industrials</option>
                                        <option th:value="'MATERIALS'" th:selected="${investment.sector.name() == 'MATERIALS'}">Materials</option>
                                        <option th:value="'UTILITIES'" th:selected="${investment.sector.name() == 'UTILITIES'}">Utilities</option>
                                        <option th:value="'REAL_ESTATE'" th:selected="${investment.sector.name() == 'REAL_ESTATE'}">Real Estate</option>
                                        <option th:value="'COMMUNICATION_SERVICES'" th:selected="${investment.sector.name() == 'COMMUNICATION_SERVICES'}">Communication Services</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="status" class="form-label">Status</label>
                                    <select class="form-control" id="status" name="status" required>
                                        <option th:value="'PENDING'" th:selected="${investment.status.name() == 'PENDING'}">Pending</option>
                                        <option th:value="'ACTIVE'" th:selected="${investment.status.name() == 'ACTIVE'}">Active</option>
                                        <option th:value="'EXITED'" th:selected="${investment.status.name() == 'EXITED'}">Exited</option>
                                        <option th:value="'WRITTEN_OFF'" th:selected="${investment.status.name() == 'WRITTEN_OFF'}">Written Off</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="stage" class="form-label">Stage</label>
                                    <select class="form-control" id="stage" name="stage" required>
                                        <option th:value="'PRE_SEED'" th:selected="${investment.stage.name() == 'PRE_SEED'}">Pre-Seed</option>
                                        <option th:value="'SEED'" th:selected="${investment.stage.name() == 'SEED'}">Seed</option>
                                        <option th:value="'SERIES_A'" th:selected="${investment.stage.name() == 'SERIES_A'}">Series A</option>
                                        <option th:value="'SERIES_B'" th:selected="${investment.stage.name() == 'SERIES_B'}">Series B</option>
                                        <option th:value="'SERIES_C'" th:selected="${investment.stage.name() == 'SERIES_C'}">Series C</option>
                                        <option th:value="'GROWTH'" th:selected="${investment.stage.name() == 'GROWTH'}">Growth</option>
                                        <option th:value="'PUBLIC'" th:selected="${investment.stage.name() == 'PUBLIC'}">Public</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="riskLevel" class="form-label">Risk Level</label>
                            <select class="form-control" id="riskLevel" name="riskLevel" required>
                                <option th:value="'LOW'" th:selected="${investment.riskLevel.name() == 'LOW'}">Low</option>
                                <option th:value="'MEDIUM'" th:selected="${investment.riskLevel.name() == 'MEDIUM'}">Medium</option>
                                <option th:value="'HIGH'" th:selected="${investment.riskLevel.name() == 'HIGH'}">High</option>
                                <option th:value="'VERY_HIGH'" th:selected="${investment.riskLevel.name() == 'VERY_HIGH'}">Very High</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">
                        <h5>Financial Information</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="pricePerUnit" class="form-label">Price Per Unit ($)</label>
                                    <input type="number" step="0.01" class="form-control" id="pricePerUnit" name="pricePerUnit" th:value="${investment.pricePerUnit}" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="quantity" class="form-label">Quantity</label>
                                    <input type="number" class="form-control" id="quantity" name="quantity" th:value="${investment.quantity}" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="currentValue" class="form-label">Current Value Per Unit ($)</label>
                                    <input type="number" step="0.01" class="form-control" id="currentValue" name="currentValue" th:value="${investment.currentValue}" required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="alert alert-info">
                                    <strong>Calculated Invested Amount:</strong> $<span id="investedAmount">0.00</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="alert alert-success">
                                    <strong>Current Total Value:</strong> $<span id="currentTotalValue">0.00</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Update Investment</button>
                    <a th:href="@{/investments/{id}(id=${investment.id})}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h5>Current Performance</h5>
                </div>
                <div class="card-body">
                    <p><strong>Invested Amount:</strong> $<span th:text="${#numbers.formatDecimal(investment.investedAmount, 1, 2)}">0.00</span></p>
                    <p><strong>Current Value:</strong> $<span th:text="${#numbers.formatDecimal(investment.currentTotalValue, 1, 2)}">0.00</span></p>
                    <p><strong>Profit/Loss:</strong>
                        <span th:class="${investment.profitLoss >= 0 ? 'text-success' : 'text-danger'}">
                            $<span th:text="${#numbers.formatDecimal(investment.profitLoss, 1, 2)}">0.00</span>
                            (<span th:text="${#numbers.formatDecimal(investment.profitLossPercentage, 1, 2)}">0.00</span>%)
                        </span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateCalculations() {
        const price = parseFloat(document.getElementById('pricePerUnit').value) || 0;
        const quantity = parseInt(document.getElementById('quantity').value) || 0;
        const currentValue = parseFloat(document.getElementById('currentValue').value) || 0;

        const investedAmount = price * quantity;
        const currentTotalValue = currentValue * quantity;

        document.getElementById('investedAmount').textContent = investedAmount.toFixed(2);
        document.getElementById('currentTotalValue').textContent = currentTotalValue.toFixed(2);
    }

    // Update calculations on input change
    document.getElementById('pricePerUnit').addEventListener('input', updateCalculations);
    document.getElementById('quantity').addEventListener('input', updateCalculations);
    document.getElementById('currentValue').addEventListener('input', updateCalculations);

    // Initial calculation
    updateCalculations();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
