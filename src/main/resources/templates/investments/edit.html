<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Investment – My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/portfolio">My Portfolio</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="/portfolio"    class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/investments"  class="btn btn-outline-light btn-sm">Investments</a>
            <a href="/transactions" class="btn btn-outline-light btn-sm">Transactions</a>
            <form th:action="@{/auth/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <a th:href="@{/investments/{id}(id=${investment.id})}" class="text-muted small text-decoration-none">&larr; Back to Investment</a>
            <h3 class="mb-0 mt-1">Edit: <span th:text="${investment.name}">Investment</span></h3>
        </div>
    </div>

    <div class="row g-4">

        <!-- Form -->
        <div class="col-md-8">
            <form th:action="@{/investments/{id}/edit(id=${investment.id})}" method="post">

                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-header bg-white border-bottom">
                        <h6 class="mb-0">Basic Information</h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Investment Name</label>
                                <input type="text" class="form-control" name="name" th:value="${investment.name}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Sector</label>
                                <select class="form-select" name="sector" required>
                                    <option value="TECHNOLOGY"              th:selected="${investment.sector.name() == 'TECHNOLOGY'}">Technology</option>
                                    <option value="HEALTHCARE"              th:selected="${investment.sector.name() == 'HEALTHCARE'}">Healthcare</option>
                                    <option value="FINANCE"                 th:selected="${investment.sector.name() == 'FINANCE'}">Finance</option>
                                    <option value="ENERGY"                  th:selected="${investment.sector.name() == 'ENERGY'}">Energy</option>
                                    <option value="CONSUMER_DISCRETIONARY"  th:selected="${investment.sector.name() == 'CONSUMER_DISCRETIONARY'}">Consumer Discretionary</option>
                                    <option value="CONSUMER_STAPLES"        th:selected="${investment.sector.name() == 'CONSUMER_STAPLES'}">Consumer Staples</option>
                                    <option value="INDUSTRIALS"             th:selected="${investment.sector.name() == 'INDUSTRIALS'}">Industrials</option>
                                    <option value="MATERIALS"               th:selected="${investment.sector.name() == 'MATERIALS'}">Materials</option>
                                    <option value="UTILITIES"               th:selected="${investment.sector.name() == 'UTILITIES'}">Utilities</option>
                                    <option value="REAL_ESTATE"             th:selected="${investment.sector.name() == 'REAL_ESTATE'}">Real Estate</option>
                                    <option value="COMMUNICATION_SERVICES"  th:selected="${investment.sector.name() == 'COMMUNICATION_SERVICES'}">Communication Services</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-muted">Status</label>
                                <select class="form-select" name="status" required>
                                    <option value="PENDING"    th:selected="${investment.status.name() == 'PENDING'}">Pending</option>
                                    <option value="ACTIVE"     th:selected="${investment.status.name() == 'ACTIVE'}">Active</option>
                                    <option value="EXITED"     th:selected="${investment.status.name() == 'EXITED'}">Exited</option>
                                    <option value="WRITTEN_OFF" th:selected="${investment.status.name() == 'WRITTEN_OFF'}">Written Off</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-muted">Stage</label>
                                <select class="form-select" name="stage" required>
                                    <option value="PRE_SEED"  th:selected="${investment.stage.name() == 'PRE_SEED'}">Pre-Seed</option>
                                    <option value="SEED"      th:selected="${investment.stage.name() == 'SEED'}">Seed</option>
                                    <option value="SERIES_A"  th:selected="${investment.stage.name() == 'SERIES_A'}">Series A</option>
                                    <option value="SERIES_B"  th:selected="${investment.stage.name() == 'SERIES_B'}">Series B</option>
                                    <option value="SERIES_C"  th:selected="${investment.stage.name() == 'SERIES_C'}">Series C</option>
                                    <option value="GROWTH"    th:selected="${investment.stage.name() == 'GROWTH'}">Growth</option>
                                    <option value="PUBLIC"    th:selected="${investment.stage.name() == 'PUBLIC'}">Public</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-muted">Risk Level</label>
                                <select class="form-select" name="riskLevel" required>
                                    <option value="LOW"       th:selected="${investment.riskLevel.name() == 'LOW'}">Low</option>
                                    <option value="MEDIUM"    th:selected="${investment.riskLevel.name() == 'MEDIUM'}">Medium</option>
                                    <option value="HIGH"      th:selected="${investment.riskLevel.name() == 'HIGH'}">High</option>
                                    <option value="VERY_HIGH" th:selected="${investment.riskLevel.name() == 'VERY_HIGH'}">Very High</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-header bg-white border-bottom">
                        <h6 class="mb-0">Financial Information</h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small text-muted">Price Per Unit ($)</label>
                                <input type="number" step="0.01" min="0" class="form-control" id="pricePerUnit" name="pricePerUnit" th:value="${investment.pricePerUnit}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-muted">Quantity</label>
                                <input type="number" min="1" class="form-control" id="quantity" name="quantity" th:value="${investment.quantity}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-muted">Current Value Per Unit ($)</label>
                                <input type="number" step="0.01" min="0" class="form-control" id="currentValue" name="currentValue" th:value="${investment.currentValue}" required>
                            </div>
                        </div>
                        <div class="row g-3 mt-1">
                            <div class="col-md-6">
                                <div class="alert alert-info py-2 mb-0 small">
                                    <strong>Invested Amount:</strong> $<span id="investedAmount">0.00</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="alert alert-success py-2 mb-0 small">
                                    <strong>Current Total Value:</strong> $<span id="currentTotalValue">0.00</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a th:href="@{/investments/{id}(id=${investment.id})}" class="btn btn-outline-secondary">Cancel</a>
                </div>

            </form>
        </div>

        <!-- Right: Current Performance -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom">
                    <h6 class="mb-0">Current Performance</h6>
                </div>
                <div class="card-body">
                    <p class="mb-2"><span class="text-muted small">Invested Amount</span><br>
                        <strong>$<span th:text="${#numbers.formatDecimal(investment.investedAmount, 1, 'COMMA', 2, 'POINT')}">0.00</span></strong></p>
                    <p class="mb-2"><span class="text-muted small">Current Value</span><br>
                        <strong class="text-primary">$<span th:text="${#numbers.formatDecimal(investment.currentTotalValue, 1, 'COMMA', 2, 'POINT')}">0.00</span></strong></p>
                    <p class="mb-0"><span class="text-muted small">Profit / Loss</span><br>
                        <strong th:class="${investment.profitLoss >= 0 ? 'text-success' : 'text-danger'}">
                            $<span th:text="${#numbers.formatDecimal(investment.profitLoss, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                            (<span th:text="${#numbers.formatDecimal(investment.profitLossPercentage, 1, 2)}">0.00</span>%)
                        </strong>
                    </p>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function updateCalculations() {
        const price = parseFloat(document.getElementById('pricePerUnit').value) || 0;
        const qty   = parseInt(document.getElementById('quantity').value) || 0;
        const cur   = parseFloat(document.getElementById('currentValue').value) || 0;
        document.getElementById('investedAmount').textContent    = (price * qty).toFixed(2);
        document.getElementById('currentTotalValue').textContent = (cur * qty).toFixed(2);
    }
    ['pricePerUnit', 'quantity', 'currentValue'].forEach(id =>
        document.getElementById(id).addEventListener('input', updateCalculations));
    updateCalculations();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
