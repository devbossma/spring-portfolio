<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Investments – My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/portfolio">My Portfolio</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="/portfolio"    class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/investments"  class="btn btn-outline-light btn-sm">Investments</a>
            <a href="/transactions" class="btn btn-outline-light btn-sm">Transactions</a>
            <form th:action="@{/auth/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">

    <!-- Add Investment Form -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white border-bottom">
            <h5 class="mb-0">New Investment</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/investments}" method="post">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label small text-muted">Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Acme Corp" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-muted">Price per Unit ($)</label>
                        <input type="number" step="0.01" min="0.01" name="pricePerUnit" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="col-md-1">
                        <label class="form-label small text-muted">Qty</label>
                        <input type="number" name="quantity" class="form-control" value="1" min="1" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small text-muted">Sector</label>
                        <select name="sector" class="form-select">
                            <option value="TECHNOLOGY">Technology</option>
                            <option value="HEALTHCARE">Healthcare</option>
                            <option value="FINANCE">Finance</option>
                            <option value="ENERGY">Energy</option>
                            <option value="CONSUMER_DISCRETIONARY">Consumer Discretionary</option>
                            <option value="CONSUMER_STAPLES">Consumer Staples</option>
                            <option value="INDUSTRIALS">Industrials</option>
                            <option value="MATERIALS">Materials</option>
                            <option value="UTILITIES">Utilities</option>
                            <option value="REAL_ESTATE">Real Estate</option>
                            <option value="COMMUNICATION_SERVICES">Communication Services</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <label class="form-label small text-muted">Stage</label>
                        <select name="stage" class="form-select">
                            <option value="PRE_SEED">Pre-Seed</option>
                            <option value="SEED">Seed</option>
                            <option value="SERIES_A">Series A</option>
                            <option value="SERIES_B">Series B</option>
                            <option value="SERIES_C">Series C</option>
                            <option value="GROWTH">Growth</option>
                            <option value="PUBLIC">Public</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <label class="form-label small text-muted">Risk</label>
                        <select name="riskLevel" class="form-select">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                            <option value="VERY_HIGH">Very High</option>
                        </select>
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-success w-100">Add</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Investments Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
            <h5 class="mb-0">All Investments</h5>
            <div class="d-flex gap-2">
                <a th:href="@{/investments(sort='name')}"
                   th:class="${sort == 'name'} ? 'btn btn-primary btn-sm' : 'btn btn-outline-secondary btn-sm'">Name</a>
                <a th:href="@{/investments(sort='amount_asc')}"
                   th:class="${sort == 'amount_asc'} ? 'btn btn-primary btn-sm' : 'btn btn-outline-secondary btn-sm'">Amount ↑</a>
                <a th:href="@{/investments(sort='amount_desc')}"
                   th:class="${sort == 'amount_desc'} ? 'btn btn-primary btn-sm' : 'btn btn-outline-secondary btn-sm'">Amount ↓</a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(investments)}" class="card-body">
            <p class="text-muted mb-0">No investments yet. Use the form above to add one.</p>
        </div>

        <div th:if="${!#lists.isEmpty(investments)}" class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Sector</th>
                        <th>Stage</th>
                        <th>Status</th>
                        <th class="text-end">Invested</th>
                        <th class="text-end">Current Value</th>
                        <th class="text-end">P&amp;L</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="inv : ${investments}">
                        <td class="fw-semibold" th:text="${inv.name}">—</td>
                        <td><span class="text-muted small" th:text="${inv.sector}">—</span></td>
                        <td><span class="text-muted small" th:text="${inv.stage}">—</span></td>
                        <td>
                            <span th:class="${'badge ' +
                                (inv.status.name() == 'ACTIVE'     ? 'bg-success' :
                                 inv.status.name() == 'PENDING'    ? 'bg-secondary' :
                                 inv.status.name() == 'EXITED'     ? 'bg-primary' :
                                 'bg-danger')}"
                                  th:text="${inv.status}">—</span>
                        </td>
                        <td class="text-end">$<span th:text="${#numbers.formatDecimal(inv.investedAmount, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
                        <td class="text-end">$<span th:text="${#numbers.formatDecimal(inv.currentTotalValue, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
                        <td class="text-end">
                            <span th:class="${inv.profitLoss >= 0 ? 'text-success' : 'text-danger'}">
                                $<span th:text="${#numbers.formatDecimal(inv.profitLoss, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                                <small>(<span th:text="${#numbers.formatDecimal(inv.profitLossPercentage, 1, 2)}">0</span>%)</small>
                            </span>
                        </td>
                        <td class="text-center text-nowrap">
                            <a th:href="@{/investments/{id}(id=${inv.id})}" class="btn btn-outline-primary btn-sm">View</a>
                            <a th:if="${!inv.exited}" th:href="@{/investments/{id}/edit(id=${inv.id})}" class="btn btn-outline-secondary btn-sm">Edit</a>
                            <button th:if="${!inv.exited}"
                                    class="btn btn-outline-danger btn-sm"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="'#exitModal-' + ${inv.id}">Exit</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Exit Modals -->
<div th:each="inv : ${investments}">
    <div th:if="${!inv.exited}" class="modal fade" th:id="'exitModal-' + ${inv.id}" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title">Exit: <span th:text="${inv.name}"></span></h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/investments/exit}" method="post">
                    <div class="modal-body">
                        <input type="hidden" name="id" th:value="${inv.id}">
                        <label class="form-label small">Exit Value ($)</label>
                        <input type="number" step="0.01" name="exitValue"
                               class="form-control" th:value="${inv.currentTotalValue}" required>
                        <div class="form-text">Current: $<span th:text="${#numbers.formatDecimal(inv.currentTotalValue, 1, 'COMMA', 2, 'POINT')}"></span></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-danger btn-sm">Confirm Exit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
