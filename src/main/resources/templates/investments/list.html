<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Investments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Manage Investments</h1>

    <a href="/" class="btn btn-secondary mb-3">Back to Home</a>

    <div class="mb-3">
        <a href="?sort=name" class="btn btn-outline-primary">Sort by Name</a>
        <a href="?sort=amount_asc" class="btn btn-outline-primary">Sort by Amount (Low to High)</a>
        <a href="?sort=amount_desc" class="btn btn-outline-primary">Sort by Amount (High to Low)</a>
    </div>

    <h3>Add New Investment</h3>
    <form th:action="@{/investments}" method="post" class="mb-4">
        <div class="row">
            <div class="col-md-3">
                <input type="text" name="name" class="form-control" placeholder="Investment Name" required>
            </div>
            <div class="col-md-2">
                <input type="number" step="0.01" name="pricePerUnit" class="form-control" placeholder="Price per Unit" required>
            </div>
            <div class="col-md-1">
                <input type="number" name="quantity" class="form-control" placeholder="Qty" value="1" required>
            </div>
            <div class="col-md-2">
                <select name="sector" class="form-control">
                    <option value="TECHNOLOGY">Technology</option>
                    <option value="HEALTHCARE">Healthcare</option>
                    <option value="FINANCE">Finance</option>
                    <option value="ENERGY">Energy</option>
                    <option value="CONSUMER_DISCRETIONARY">Consumer Discretionary</option>
                    <option value="CONSUMER_STAPLES">Consumer Staples</option>
                    <option value="INDUSTRIALS">Industrials</option>
                    <option value="MATERIALS">Materials</option>
                    <option value="UTILITIES">Utilities</option>
                    <option value="REAL_ESTATE">Real Estate</option>
                    <option value="COMMUNICATION_SERVICES">Communication Services</option>
                </select>
            </div>
            <div class="col-md-1">
                <select name="status" class="form-control">
                    <option value="PENDING">Pending</option>
                    <option value="ACTIVE">Active</option>
                    <option value="EXITED">Exited</option>
                    <option value="WRITTEN_OFF">Written Off</option>
                </select>
            </div>
            <div class="col-md-1">
                <select name="stage" class="form-control">
                    <option value="PRE_SEED">Pre-Seed</option>
                    <option value="SEED">Seed</option>
                    <option value="SERIES_A">Series A</option>
                    <option value="SERIES_B">Series B</option>
                    <option value="SERIES_C">Series C</option>
                    <option value="GROWTH">Growth</option>
                    <option value="PUBLIC">Public</option>
                </select>
            </div>
            <div class="col-md-1">
                <select name="riskLevel" class="form-control">
                    <option value="LOW">Low</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="HIGH">High</option>
                    <option value="VERY_HIGH">Very High</option>
                </select>
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-success">Add</button>
            </div>
        </div>
    </form>

    <h3>Existing Investments</h3>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Invested Amount</th>
            <th>Current Value</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="investment : ${investments}">
            <td>
                <form th:action="@{/investments/update}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${investment.id}">
                    <input type="text" name="name" th:value="${investment.name}" class="form-control d-inline w-auto">
                    <button type="submit" class="btn btn-sm btn-primary">Update</button>
                </form>
            </td>
            <td th:text="${#numbers.formatDecimal(investment.investedAmount, 1, 2)}">$0.00</td>
            <td>
                <form th:action="@{/investments/update-value}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${investment.id}">
                    <input type="number" step="0.01" name="currentValue" th:value="${investment.currentValue}" class="form-control d-inline w-auto">
                    <button type="submit" class="btn btn-sm btn-success">Update</button>
                </form>
            </td>
            <td th:text="${investment.status}">PENDING</td>
            <td>
                <!-- Add more actions if needed -->
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
