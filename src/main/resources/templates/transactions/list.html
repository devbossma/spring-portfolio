<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transactions – My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/portfolio">My Portfolio</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a href="/portfolio"      class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/investments"    class="btn btn-outline-light btn-sm">Investments</a>
            <a href="/transactions"   class="btn btn-light btn-sm">Transactions</a>
            <form th:action="@{/auth/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">

    <h4 class="mb-4 text-muted fw-normal">Transaction History</h4>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3" id="txTabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#fund-tab">
                Fund Transactions
                <span class="badge bg-secondary ms-1" th:text="${#lists.size(fundTransactions)}">0</span>
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#investment-tab">
                Investment Transactions
                <span class="badge bg-secondary ms-1" th:text="${#lists.size(investmentTransactions)}">0</span>
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- Fund Transactions -->
        <div class="tab-pane fade show active" id="fund-tab">
            <div class="card border-0 shadow-sm">
                <div th:if="${#lists.isEmpty(fundTransactions)}" class="card-body text-muted">
                    No fund transactions yet.
                </div>
                <div th:if="${!#lists.isEmpty(fundTransactions)}" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th class="text-end">Amount</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tx : ${fundTransactions}">
                                <td class="text-muted small"
                                    th:text="${#temporals.format(tx.createdAt, 'dd MMM yyyy, HH:mm')}">—</td>
                                <td>
                                    <span th:class="${'badge ' + (tx.type.name() == 'DEPOSIT' ? 'bg-success' : 'bg-danger')}"
                                          th:text="${tx.type}">—</span>
                                </td>
                                <td class="text-end fw-semibold"
                                    th:class="${'text-end fw-semibold ' + (tx.type.name() == 'DEPOSIT' ? 'text-success' : 'text-danger')}">
                                    <span th:text="${tx.type.name() == 'DEPOSIT' ? '+' : '-'}"></span>$<span
                                        th:text="${#numbers.formatDecimal(tx.amount, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                                </td>
                                <td class="text-muted small" th:text="${tx.notes}">—</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Investment Transactions -->
        <div class="tab-pane fade" id="investment-tab">
            <div class="card border-0 shadow-sm">
                <div th:if="${#lists.isEmpty(investmentTransactions)}" class="card-body text-muted">
                    No investment transactions yet.
                </div>
                <div th:if="${!#lists.isEmpty(investmentTransactions)}" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Investment</th>
                                <th>Type</th>
                                <th class="text-end">Price / Unit</th>
                                <th class="text-end">Qty</th>
                                <th class="text-end">Total</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tx : ${investmentTransactions}">
                                <td class="text-muted small"
                                    th:text="${#temporals.format(tx.createdAt, 'dd MMM yyyy, HH:mm')}">—</td>
                                <td>
                                    <a th:href="@{/investments/{id}(id=${tx.investment.id})}"
                                       th:text="${tx.investment.name}"
                                       class="text-decoration-none fw-semibold">—</a>
                                </td>
                                <td>
                                    <span th:class="${'badge ' + (tx.type.name() == 'BUY' ? 'bg-primary' : 'bg-success')}"
                                          th:text="${tx.type}">—</span>
                                </td>
                                <td class="text-end">$<span th:text="${#numbers.formatDecimal(tx.pricePerUnit, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
                                <td class="text-end" th:text="${tx.quantity}">0</td>
                                <td class="text-end fw-semibold"
                                    th:class="${'text-end fw-semibold ' + (tx.type.name() == 'BUY' ? 'text-danger' : 'text-success')}">
                                    <span th:text="${tx.type.name() == 'BUY' ? '-' : '+'}"></span>$<span
                                        th:text="${#numbers.formatDecimal(tx.amount, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                                </td>
                                <td class="text-muted small" th:text="${tx.notes}">—</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
