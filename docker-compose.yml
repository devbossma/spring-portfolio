services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: spring_portfolio
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d spring_portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "80:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/spring_portfolio
      DB_USERNAME: portfolio_user
      DB_PASSWORD: ${DB_PASSWORD}

volumes:
  postgres_data:
